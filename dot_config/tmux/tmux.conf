set -g mouse on
set -g default-terminal 'screen-256color'
set -g default-terminal 'xterm-256color'

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# act like vim
setw -g mode-keys vi
# Keybindings
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Omarchy Tmux integration
source-file ~/.config/omarchy/current/theme/tmux.conf
# End Omarchy Tmux integration

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum' 
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fabioluciano/tmux-powerkit'

set -g @continuum-restore 'on'

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g status-position bottom

# Zen Mode
set-option -g allow-passthrough on


# ============================================================================
# Omarchy Tmux Integration (v2.1)
# Theme profiles persist in ~/.config/tmux/omarchy-themes/
# Current theme syncs via symlink - DO NOT EDIT THIS SECTION
# ============================================================================
source-file ~/.config/tmux/omarchy-current-theme.conf
# End Omarchy Tmux Integration

# Initialize and run tpm
# Load omarchy-tmux theme
if-shell "[ -f ~/.config/tmux/powerkit-theme.conf ]" "source-file ~/.config/tmux/powerkit-theme.conf"

run '~/.config/tmux/plugins/tpm/tpm'

# Force status bar to bottom (after plugins load)
set -g status-position bottom
