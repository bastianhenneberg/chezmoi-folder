# Yazi — main config. Managed via chezmoi.
# Docs: https://yazi-rs.github.io/docs/configuration/yazi

[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
title_format   = "Yazi: {cwd}"

[preview]
wrap           = "no"
tab_size       = 2
max_width      = 1000
max_height     = 1000
image_delay    = 30
image_filter   = "triangle"
image_quality  = 75
sixel_fraction = 15

[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', desc = "Edit", block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open", orphan = true, for = "linux" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal", orphan = true, for = "linux" },
]
extract = [
  { run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix" },
]
play = [
  { run = 'mpv --force-window "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
  { url = "*/", use = [ "edit", "open", "reveal" ] },

  { mime = "text/*",          use = [ "edit", "reveal" ] },
  { mime = "image/*",         use = [ "open", "reveal" ] },
  { mime = "{audio,video}/*", use = [ "play", "reveal" ] },

  { mime = "application/{,g}zip",                            use = [ "extract", "reveal" ] },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", use = [ "extract", "reveal" ] },

  { mime = "application/{pdf,doc,rtf}", use = [ "open", "reveal" ] },

  { mime = "inode/x-empty", use = [ "edit", "reveal" ] },
  { mime = "*",             use = [ "open", "reveal" ] },
]
